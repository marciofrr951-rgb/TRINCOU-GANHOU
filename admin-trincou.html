<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Trincou Ganhou</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: #0d3d0d; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: white; border-radius: 20px; padding: 32px; width: 100%; max-width: 480px; box-shadow: 0 24px 64px rgba(0,0,0,0.4); }
  h1 { font-size: 22px; font-weight: 900; color: #0d3d0d; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #888; margin-bottom: 24px; }
  input { width: 100%; padding: 12px 16px; border: 1.5px solid #ddd; border-radius: 10px; font-size: 16px; font-family: 'Nunito', sans-serif; outline: none; margin-bottom: 12px; }
  input:focus { border-color: #1a6e1a; }
  .btn { width: 100%; background: #1a6e1a; color: white; border: none; border-radius: 10px; padding: 14px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: 'Nunito', sans-serif; }
  .btn:hover { background: #0d3d0d; }
  .erro { color: #e03131; font-size: 13px; margin-bottom: 10px; display: none; font-weight: 700; }

  /* Dashboard */
  #dashboard { display: none; }
  .header-dash { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .header-dash h2 { font-size: 20px; font-weight: 900; color: #0d3d0d; }
  .btn-sair { background: #f0f0f0; color: #555; border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Nunito', sans-serif; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .stat { border-radius: 12px; padding: 16px; text-align: center; }
  .stat-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .stat-val { font-size: 26px; font-weight: 900; }
  .stat-green { background: #d1f7e0; }
  .stat-green .stat-label { color: #1a5c35; }
  .stat-green .stat-val { color: #0d3d0d; }
  .stat-blue { background: #dbeafe; }
  .stat-blue .stat-label { color: #1e40af; }
  .stat-blue .stat-val { color: #1e3a8a; }
  .stat-yellow { background: #fff3cd; }
  .stat-yellow .stat-label { color: #856404; }
  .stat-yellow .stat-val { color: #7c4a00; }
  .stat-red { background: #fee2e2; }
  .stat-red .stat-label { color: #991b1b; }
  .stat-red .stat-val { color: #7f1d1d; }
  .section-title { font-size: 14px; font-weight: 900; color: #0d3d0d; text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px; }
  .cambista-row { background: #f9f9f9; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
  .cambista-nome { font-weight: 700; font-size: 14px; color: #0d3d0d; }
  .cambista-stats { font-size: 12px; color: #555; margin-top: 2px; }
  .cambista-val { font-weight: 900; font-size: 16px; color: #1a6e1a; }
  .loading { text-align: center; color: #888; padding: 20px; font-size: 14px; }
  .spinner { width: 20px; height: 20px; border: 2px solid #eee; border-top-color: #1a6e1a; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn-atualizar { background: #f0f7f0; color: #1a6e1a; border: 1.5px solid #1a6e1a; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Nunito', sans-serif; }
  .total-geral { background: #0d3d0d; color: white; border-radius: 12px; padding: 16px; text-align: center; margin-bottom: 20px; }
  .total-geral .label { font-size: 12px; color: #aed68a; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .total-geral .val { font-size: 32px; font-weight: 900; color: #f5c518; }
</style>
</head>
<body>

<div class="card">
  <!-- LOGIN -->
  <div id="login">
    <h1>🔐 Painel Admin</h1>
    <p class="sub">Trincou Ganhou — Acesso restrito</p>
    <div class="erro" id="erroLogin">⚠️ Senha incorreta!</div>
    <input type="password" id="senhaInput" placeholder="Digite a senha" onkeydown="if(event.key==='Enter') entrar()"/>
    <button class="btn" onclick="entrar()">Entrar</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">
    <div class="header-dash">
      <h2>📊 Relatório</h2>
      <div style="display:flex;gap:8px;">
        <button class="btn-atualizar" onclick="carregarDados()">🔄 Atualizar</button>
        <button class="btn-sair" onclick="sair()">Sair</button>
      </div>
    </div>

    <div id="loadingDash" class="loading"><span class="spinner"></span> Carregando dados...</div>

    <div id="conteudo" style="display:none;">
      <div class="total-geral">
        <div class="label">Total arrecadado</div>
        <div class="val" id="totalGeral">R$ 0,00</div>
      </div>

      <div class="stats-grid">
        <div class="stat stat-green">
          <div class="stat-label">Pago PIX</div>
          <div class="stat-val" id="qtdPix">0</div>
        </div>
        <div class="stat stat-blue">
          <div class="stat-label">Pago Dinheiro</div>
          <div class="stat-val" id="qtdDinheiro">0</div>
        </div>
        <div class="stat stat-yellow">
          <div class="stat-label">Disponível</div>
          <div class="stat-val" id="qtdDisponivel">0</div>
        </div>
        <div class="stat stat-red">
          <div class="stat-label">Total bilhetes</div>
          <div class="stat-val" id="qtdTotal">0</div>
        </div>
      </div>

      <div class="section-title">💰 Por cambista (dinheiro a receber)</div>
      <div id="listaCambistas"></div>

      <div class="section-title">🕐 Últimos pagamentos</div>
      <div id="listaRecentes"></div>
    </div>
  </div>
</div>

<script>
const SENHA = '36211252';
const SHEET_ID = '1ZeFUh5ItbA8Ie-v95MOdWvO5uMBxONEK_APLUQWpQBg';

function entrar() {
  const senha = document.getElementById('senhaInput').value;
  if (senha === SENHA) {
    document.getElementById('login').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    carregarDados();
  } else {
    document.getElementById('erroLogin').style.display = 'block';
    document.getElementById('senhaInput').value = '';
  }
}

function sair() {
  document.getElementById('login').style.display = 'block';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('senhaInput').value = '';
  document.getElementById('conteudo').style.display = 'none';
  document.getElementById('loadingDash').style.display = 'block';
}

async function carregarDados() {
  document.getElementById('loadingDash').style.display = 'block';
  document.getElementById('conteudo').style.display = 'none';

  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=0`;
    const resp = await fetch(url);
    const text = await resp.text();
    const json = JSON.parse(text.substring(47, text.length - 2));
    const rows = json.table.rows;
    const cols = json.table.cols.map(c => c.label);

    const idxStatus   = cols.findIndex(c => c.toUpperCase().includes('STATUS'));
    const idxCambista = cols.findIndex(c => c.toUpperCase().includes('CAMBISTA'));
    const idxTel      = cols.findIndex(c => c.toUpperCase().includes('TELEFONE'));
    const idxId       = 0;
    const VALOR = 2.5;

    let pix = 0, dinheiro = 0, disponivel = 0;
    const cambistas = {};
    const recentes = [];

    rows.slice(1).forEach(row => {
      const cells = row.c;
      const status = String(cells[idxStatus]?.v || '').toUpperCase();
      const cambista = String(cells[idxCambista]?.v || '').trim();
      const id = String(cells[idxId]?.v || '').padStart(4,'0');

      if (status.includes('PAGO') && !status.includes('DINHEIRO')) pix++;
      else if (status.includes('DINHEIRO')) {
        dinheiro++;
        if (cambista) {
          if (!cambistas[cambista]) cambistas[cambista] = 0;
          cambistas[cambista]++;
        }
      }
      else disponivel++;

      if (status.includes('PAGO')) {
        recentes.push({ id, status, cambista });
      }
    });

    const total = (pix + dinheiro) * VALOR;
    document.getElementById('totalGeral').textContent = 'R$ ' + total.toFixed(2).replace('.', ',');
    document.getElementById('qtdPix').textContent = pix;
    document.getElementById('qtdDinheiro').textContent = dinheiro;
    document.getElementById('qtdDisponivel').textContent = disponivel;
    document.getElementById('qtdTotal').textContent = rows.length - 1;

    // Cambistas
    const listaCambistas = document.getElementById('listaCambistas');
    if (Object.keys(cambistas).length === 0) {
      listaCambistas.innerHTML = '<div style="font-size:13px;color:#888;padding:8px;">Nenhum pagamento em dinheiro registrado ainda.</div>';
    } else {
      listaCambistas.innerHTML = Object.entries(cambistas).map(([nome, qtd]) => `
        <div class="cambista-row">
          <div>
            <div class="cambista-nome">👤 ${nome}</div>
            <div class="cambista-stats">${qtd} bilhete${qtd > 1 ? 's' : ''} em dinheiro</div>
          </div>
          <div class="cambista-val">R$ ${(qtd * VALOR).toFixed(2).replace('.', ',')}</div>
        </div>`).join('');
    }

    // Últimos 10 pagamentos
    const listaRecentes = document.getElementById('listaRecentes');
    const ultimos = recentes.slice(-10).reverse();
    if (ultimos.length === 0) {
      listaRecentes.innerHTML = '<div style="font-size:13px;color:#888;padding:8px;">Nenhum pagamento ainda.</div>';
    } else {
      listaRecentes.innerHTML = ultimos.map(b => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#f9f9f9;border-radius:10px;margin-bottom:6px;">
          <div>
            <span style="font-weight:700;color:#0d3d0d;">Bilhete #${b.id}</span>
            ${b.cambista ? `<span style="font-size:11px;color:#888;margin-left:6px;">via ${b.cambista}</span>` : ''}
          </div>
          <span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:${b.status.includes('DINHEIRO') ? '#dbeafe' : '#d1f7e0'};color:${b.status.includes('DINHEIRO') ? '#1e40af' : '#1a5c35'};">${b.status}</span>
        </div>`).join('');
    }

    document.getElementById('loadingDash').style.display = 'none';
    document.getElementById('conteudo').style.display = 'block';

  } catch(e) {
    document.getElementById('loadingDash').innerHTML = '⚠️ Erro ao carregar dados. <button onclick="carregarDados()" style="color:#1a6e1a;background:none;border:none;cursor:pointer;font-weight:700;">Tentar novamente</button>';
  }
}
</script>
</body>
</html>
