<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — 08 da Sorte</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --roxo: #7c3aed;
  --roxo-deep: #5b21b6;
  --verde: #4ade4a;
  --vermelho: #e03131;
  --card: rgba(255,255,255,0.05);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(135deg, #0a0612, #1a0f2e);
  min-height: 100vh;
  color: #fff;
  padding: 20px;
}

.container { max-width: 1200px; margin: 0 auto; }

header {
  text-align: center;
  margin-bottom: 40px;
  border-bottom: 2px solid var(--roxo);
  padding-bottom: 20px;
}

header h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  letter-spacing: 2px;
  margin-bottom: 10px;
}

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }

.panel {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(124,58,237,0.2);
  border-radius: 16px;
  padding: 24px;
}

.panel h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 1px;
  margin-bottom: 20px;
  color: var(--roxo);
}

.form-group {
  margin-bottom: 16px;
}

label {
  display: block;
  font-size: 12px;
  color: rgba(255,255,255,0.7);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 700;
}

input, select {
  width: 100%;
  padding: 12px;
  border: 1px solid rgba(124,58,237,0.3);
  border-radius: 8px;
  background: rgba(0,0,0,0.3);
  color: #fff;
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
}

input:focus, select:focus {
  outline: none;
  border-color: var(--roxo);
  box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
}

.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 8px;
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  font-weight: 900;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  transition: all 0.3s;
}

.btn-primary {
  background: linear-gradient(135deg, var(--roxo), var(--roxo-deep));
  color: #fff;
}

.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(124,58,237,0.4); }

.btn-success {
  background: linear-gradient(135deg, var(--verde), #2ecc2e);
  color: #000;
}

.btn-success:hover { transform: translateY(-2px); }

.btn-danger {
  background: var(--vermelho);
  color: #fff;
  width: auto;
  padding: 8px 16px;
  font-size: 12px;
}

.msg {
  padding: 12px 16px;
  border-radius: 8px;
  margin-bottom: 16px;
  font-size: 13px;
  font-weight: 700;
}

.msg-success { background: rgba(74,222,74,0.2); color: var(--verde); border: 1px solid rgba(74,222,74,0.3); }
.msg-error { background: rgba(224,49,49,0.2); color: var(--vermelho); border: 1px solid rgba(224,49,49,0.3); }

/* RODADAS */
.rodadas {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
  margin-top: 20px;
}

.rodada-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(124,58,237,0.2);
  border-radius: 12px;
  padding: 16px;
}

.rodada-header {
  display: flex;
  justify-content: space-between;
  align-items: start;
  margin-bottom: 12px;
}

.rodada-titulo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 1px;
  color: var(--roxo);
}

.rodada-status {
  display: inline-block;
  padding: 4px 8px;
  background: rgba(74,222,74,0.2);
  border-radius: 4px;
  font-size: 10px;
  font-weight: 900;
  color: var(--verde);
  text-transform: uppercase;
}

.rodada-info {
  font-size: 13px;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

.rodada-info-label { color: rgba(255,255,255,0.6); }
.rodada-info-value { font-weight: 700; }

.rodada-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

.rodada-actions button {
  flex: 1;
  padding: 8px;
  font-size: 11px;
  font-weight: 700;
}

.spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 3px solid rgba(124,58,237,0.25);
  border-top-color: var(--roxo);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  vertical-align: middle;
  margin-right: 8px;
}

@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 768px) {
  .grid-2 { grid-template-columns: 1fr; }
  header h1 { font-size: 24px; }
  .rodadas { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>08 DA SORTE — ADMIN</h1>
    <p style="color: rgba(255,255,255,0.6); font-size: 13px; margin-top: 10px;">Gerenciar rodadas e resultados</p>
  </header>

  <div id="msg" style="display:none;"></div>

  <div class="grid-2">
    <!-- PAINEL LANÇAR RESULTADO -->
    <div class="panel">
      <h2>🎰 Lançar Resultado</h2>
      <div class="form-group">
        <label>Números (separados por hífen, ex: 01-15-23-45)</label>
        <input type="text" id="numeros" placeholder="01-15-23-45-55-67-74-79">
      </div>
      <button class="btn btn-success" onclick="lancarResultado()">Lançar Resultado</button>
      <p style="font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 12px;">⚠️ Isso vai atualizar TODAS as rodadas ativas!</p>
    </div>

    <!-- PAINEL CRIAR RODADA -->
    <div class="panel">
      <h2>➕ Criar Nova Rodada</h2>
      <div class="form-group">
        <label>Valor da Cota (R$)</label>
        <input type="number" id="valorCota" value="20" min="1" max="10000" step="0.01" placeholder="20.00">
      </div>
      <div class="form-group">
        <label>Total de Cotas</label>
        <input type="number" id="totalCotas" value="100" min="10" max="1000">
      </div>
      <div class="form-group">
        <label>🏆 Prêmio 1º Lugar (R$)</label>
        <input type="number" id="premioPrincipal" value="1200" min="1" max="999999" step="0.01" placeholder="1200.00">
      </div>
      <div class="form-group">
        <label>🎁 Prêmio Último Lugar (R$)</label>
        <input type="number" id="premioConsolacao" value="200" min="1" max="999999" step="0.01" placeholder="200.00">
      </div>
      <button class="btn btn-primary" onclick="criarRodada()">Criar Rodada</button>
    </div>

    <!-- PAINEL PREMIAÇÃO PAGA -->
    <div class="panel">
      <h2>💰 Premiação Paga</h2>
      <div class="form-group">
        <label>Valor Total Pago em Premiações (R$)</label>
        <input type="number" id="premiacaoPaga" value="0" min="0" max="999999" step="0.01" placeholder="0.00">
      </div>
      <div class="form-group">
        <label>Data de Atualização</label>
        <input type="datetime-local" id="dataPremiacao">
      </div>
      <button class="btn btn-success" onclick="salvarPremiacao()">💾 Salvar Premiação</button>
      <p style="font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 12px;">Total pago: <strong id="totalPago">R$ 0,00</strong></p>
    </div>

    <!-- PAINEL INICIAR RODADA -->
    <div class="panel">
      <h2>🚀 Iniciar Rodada</h2>
      <div class="form-group">
        <label>Selecione a Rodada</label>
        <select id="rodadaSelect" style="width:100%; padding:12px; border:1px solid rgba(124,58,237,0.3); border-radius:8px; background:rgba(0,0,0,0.3); color:#fff; font-size:14px;">
          <option value="">Carregando rodadas...</option>
        </select>
      </div>
      <div class="form-group">
        <label>Data de Início</label>
        <input type="datetime-local" id="dataInicio">
      </div>
      <button class="btn btn-primary" onclick="iniciarRodadaAdmin()">🎯 Iniciar Rodada</button>
      <p style="font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 12px;">⚠️ Use quando todas as cotas forem vendidas!</p>
    </div>
  </div>

  <!-- RODADAS ATIVAS -->
  <div class="panel">
    <h2>📊 Rodadas Ativas</h2>
    <div id="rodadas" class="rodadas">
      <p style="color: rgba(255,255,255,0.5);">Carregando rodadas...</p>
    </div>
  </div>
</div>

<script>
async function deletarRodadaConfirm(rodada) {
  if (!confirm(`⚠️ ATENÇÃO!\n\nVocê está prestes a DELETAR a rodada #${rodada}.\nIsso NÃO pode ser desfeito!\n\nConfirma?`)) return;

  try {
    var resp = await fetch('/script', {
      method: 'POST',
      body: new URLSearchParams({
        acao: 'oito_deletar_rodada',
        rodada: rodada
      })
    });
    var txt = await resp.text();

    if (txt.includes('OK')) {
      mostrarMsg('✓ Rodada #' + rodada + ' deletada!', 'success');
      setTimeout(carregarRodadas, 1500);
    } else {
      mostrarMsg('Erro: ' + txt, 'error');
    }
  } catch (e) {
    mostrarMsg('Erro: ' + e.message, 'error');
  }
}

async function lancarResultado() {
  var numeros = document.getElementById('numeros').value.trim();
  if (!numeros) return mostrarMsg('Digite os números', 'error');

  var btn = event.target;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Processando...';

  try {
    var resp = await fetch('/script', {
      method: 'POST',
      body: new URLSearchParams({
        acao: 'oito_resultado',
        numeros: numeros
      })
    });
    var data = await resp.json();

    if (data.ok) {
      mostrarMsg('✓ Resultado lançado para todas as rodadas!', 'success');
      document.getElementById('numeros').value = '';
      setTimeout(carregarRodadas, 1500);
    } else {
      mostrarMsg('Erro: ' + (data.erro || 'Desconhecido'), 'error');
    }
  } catch (e) {
    mostrarMsg('Erro: ' + e.message, 'error');
  }

  btn.disabled = false;
  btn.innerHTML = 'Lançar Resultado';
}

async function criarRodada() {
  var valorInput = document.getElementById('valorCota').value;
  var valor = parseFloat(valorInput);
  var total = parseInt(document.getElementById('totalCotas').value);
  var premioPrincipal = parseFloat(document.getElementById('premioPrincipal').value);
  var premioConsolacao = parseFloat(document.getElementById('premioConsolacao').value);

  if (!valor || valor <= 0) return mostrarMsg('Digite um valor válido', 'error');
  if (!total || total <= 0) return mostrarMsg('Digite um total válido', 'error');
  if (!premioPrincipal || premioPrincipal <= 0) return mostrarMsg('Digite um prêmio válido para 1º lugar', 'error');
  if (!premioConsolacao || premioConsolacao <= 0) return mostrarMsg('Digite um prêmio válido para último lugar', 'error');

  var btn = event.target;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Criando...';

  try {
    var body = new URLSearchParams({
      acao: 'oito_nova_rodada',
      valor: String(valor),
      total: String(total),
      premioPrincipal: String(premioPrincipal),
      premioConsolacao: String(premioConsolacao)
    });
    
    var resp = await fetch('/script', {
      method: 'POST',
      body: body
    });
    var data = await resp.json();

    if (data.ok || data.rodada) {
      mostrarMsg('✓ Rodada #' + data.rodada + ' criada com R$ ' + valor.toFixed(2) + '!', 'success');
      document.getElementById('valorCota').value = '20';
      document.getElementById('totalCotas').value = '100';
      document.getElementById('premioPrincipal').value = '1200';
      document.getElementById('premioConsolacao').value = '200';
      setTimeout(carregarRodadas, 1500);
    } else {
      mostrarMsg('Erro: ' + (data.erro || 'Desconhecido'), 'error');
    }
  } catch (e) {
    mostrarMsg('Erro: ' + e.message, 'error');
  }

  btn.disabled = false;
  btn.innerHTML = 'Criar Rodada';
}

async function carregarRodadas() {
  try {
    var resp = await fetch('/script?acao=oito_rodadas_admin');
    var rodadas = await resp.json();

    var html = '';
    if (!rodadas || rodadas.length === 0) {
      html = '<p style="color: rgba(255,255,255,0.5);">Nenhuma rodada ativa</p>';
    } else {
      rodadas.forEach(r => {
        var pct = Math.round((r.cotasVendidas / r.totalCotas) * 100);
        html += `
          <div class="rodada-card">
            <div class="rodada-header">
              <div class="rodada-titulo">Rodada #${r.rodada}</div>
              <div class="rodada-status">Ativa</div>
            </div>
            <div class="rodada-info">
              <span class="rodada-info-label">Valor:</span>
              <span class="rodada-info-value">R$ ${parseFloat(r.valor).toFixed(2)}</span>
            </div>
            <div class="rodada-info">
              <span class="rodada-info-label">Cotas:</span>
              <span class="rodada-info-value">${r.cotasVendidas}/${r.totalCotas}</span>
            </div>
            <div style="background: rgba(0,0,0,0.2); height: 6px; border-radius: 3px; overflow: hidden; margin: 8px 0;">
              <div style="width: ${pct}%; height: 100%; background: linear-gradient(90deg, var(--roxo), var(--verde));"></div>
            </div>
            <div class="rodada-info">
              <span class="rodada-info-label">Progresso:</span>
              <span class="rodada-info-value">${pct}%</span>
            </div>
            <div class="rodada-info">
              <span class="rodada-info-label">Arrecadado:</span>
              <span class="rodada-info-value">R$ ${(r.cotasVendidas * r.valor).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
            </div>
            <div class="rodada-info">
              <span class="rodada-info-label">🏆 Prêmio 1º:</span>
              <span class="rodada-info-value">R$ ${(r.premioPrincipal || 0).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
            </div>
            <div class="rodada-info">
              <span class="rodada-info-label">🎁 Prêmio Último:</span>
              <span class="rodada-info-value">R$ ${(r.premioConsolacao || 0).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>\n            </div>
            <button class="btn-danger" onclick="deletarRodadaConfirm(${r.rodada})" style="width: 100%; margin-top: 12px; padding: 8px; font-size: 12px;">🗑️ Deletar Rodada</button>
          </div>
        `;
      });
    }
    document.getElementById('rodadas').innerHTML = html;
  } catch (e) {
    document.getElementById('rodadas').innerHTML = '<p style="color: #f87171;">Erro ao carregar rodadas</p>';
  }
}

function mostrarMsg(txt, tipo) {
  var msg = document.getElementById('msg');
  msg.textContent = txt;
  msg.className = 'msg msg-' + (tipo === 'success' ? 'success' : 'error');
  msg.style.display = 'block';
  setTimeout(() => { msg.style.display = 'none'; }, 4000);
}

function salvarPremiacao() {
  try {
    var valor = parseFloat(document.getElementById('premiacaoPaga').value) || 0;
    var data = document.getElementById('dataPremiacao').value;
    
    // Salva no localStorage
    localStorage.setItem('premiacao_paga', valor.toString());
    if (data) localStorage.setItem('data_premiacao', data);
    
    // Atualiza display
    document.getElementById('totalPago').textContent = 'R$ ' + valor.toFixed(2).replace('.', ',');
    
    // Tenta exibir mensagem
    var msg = document.getElementById('msg');
    if (msg) {
      msg.textContent = '✓ Premiação salva: R$ ' + valor.toFixed(2);
      msg.className = 'msg msg-success';
      msg.style.display = 'block';
      setTimeout(() => { msg.style.display = 'none'; }, 4000);
    } else {
      alert('✓ Premiação salva: R$ ' + valor.toFixed(2));
    }
    
    console.log('Premiação salva:', { valor: valor, data: data });
  } catch(err) {
    console.error('Erro ao salvar premiação:', err);
    alert('❌ Erro ao salvar: ' + err.message);
  }
}

async function iniciarRodadaAdmin() {
  var rodada = document.getElementById('rodadaSelect').value;
  var data = document.getElementById('dataInicio').value;
  
  if (!rodada) return mostrarMsg('Selecione uma rodada', 'error');
  if (!data) return mostrarMsg('Defina a data de início', 'error');
  
  localStorage.setItem('rodada_ativa', rodada);
  localStorage.setItem('rodada_data_inicio', data);
  mostrarMsg('✓ Rodada ' + rodada + ' iniciada em ' + data, 'success');
}

// Carregar rodadas para select ao abrir
(async function carregarRodasSelect() {
  try {
    var resp = await fetch('/script?acao=oito_rodadas_admin');
    var rodadas = await resp.json();
    var select = document.getElementById('rodadaSelect');
    select.innerHTML = '<option value="">Escolha uma rodada...</option>';
    rodadas.forEach(r => {
      select.innerHTML += '<option value="' + r.rodada + '">Rodada #' + r.rodada + ' (R$ ' + r.valor.toFixed(2) + ')</option>';
    });
  } catch(e) {
    console.error('Erro ao carregar rodadas:', e);
  }
})();

// Carregar premiação salva
(function() {
  var paga = localStorage.getItem('premiacao_paga') || '0';
  document.getElementById('premiacaoPaga').value = paga;
  document.getElementById('totalPago').textContent = 'R$ ' + parseFloat(paga).toFixed(2).replace('.', ',');
})();

// Carregar rodadas ao abrir
carregarRodadas();
setInterval(carregarRodadas, 5000); // Atualiza a cada 5 segundos
</script>

</body>
</html>
