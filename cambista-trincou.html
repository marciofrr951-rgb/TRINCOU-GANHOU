<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Cambista — Trincou Ganhou</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: #071a07; min-height: 100vh; color: white; }

.login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; background: radial-gradient(ellipse at 50% 0%, #0d3d0d 0%, #071a07 70%); }
.login-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(74,222,74,0.2); border-radius: 24px; padding: 40px 32px; width: 100%; max-width: 380px; }
.login-logo { text-align: center; margin-bottom: 32px; }
.login-logo .icon { font-size: 48px; display: block; margin-bottom: 8px; }
.login-logo h1 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: white; }
.login-logo p { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }
.pin-label { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block; }
.pin-input { width: 100%; background: rgba(255,255,255,0.06); border: 1.5px solid rgba(74,222,74,0.25); border-radius: 12px; padding: 16px 20px; font-size: 24px; font-weight: 900; font-family: 'Nunito', sans-serif; color: white; outline: none; text-align: center; letter-spacing: 8px; transition: border-color 0.2s; margin-bottom: 8px; }
.pin-input:focus { border-color: #4ade4a; }
.pin-input::placeholder { letter-spacing: 2px; font-size: 14px; opacity: 0.4; }
.erro-login { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 8px; padding: 10px 14px; font-size: 13px; font-weight: 700; color: #f87171; margin-bottom: 12px; display: none; text-align: center; }
.btn-entrar { width: 100%; background: linear-gradient(135deg, #2ecc2e, #1a6e1a); color: white; border: none; border-radius: 12px; padding: 16px; font-size: 16px; font-weight: 900; cursor: pointer; font-family: 'Nunito', sans-serif; letter-spacing: 1px; }
.btn-entrar:disabled { opacity: 0.5; cursor: not-allowed; }
.login-loading { text-align: center; font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 12px; display: none; }

#dashboard { display: none; max-width: 560px; margin: 0 auto; padding: 20px; }

.topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.topbar-left h2 { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; }
.topbar-left p { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 2px; }
.topbar-right { display: flex; gap: 8px; }
.btn-sm { border: none; border-radius: 8px; padding: 8px 14px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Nunito', sans-serif; }
.btn-refresh { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.15); }
.btn-sair { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }

.resumo-total { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
.card-comissao { grid-column: 1 / -1; background: linear-gradient(135deg, #1a6e1a, #0d3d0d); border-radius: 16px; padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(74,222,74,0.2); }
.card-comissao .lbl { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.card-comissao .val { font-size: 40px; font-weight: 900; color: #4ade4a; line-height: 1; }
.card-comissao .sub { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 4px; }
.card-comissao .emoji { font-size: 48px; opacity: 0.2; }
.card-mini { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 16px; text-align: center; }
.card-mini .lbl { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.card-mini .val { font-size: 26px; font-weight: 900; }
.card-mini .sub { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 3px; }
.card-repassar { background: rgba(245,197,24,0.08); border: 1px solid rgba(245,197,24,0.2); }
.card-repassar .val { color: #f5c518; }

.periodo-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
.periodo-tab { flex: 1; border: none; border-radius: 20px; padding: 9px 8px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Nunito', sans-serif; white-space: nowrap; transition: all 0.2s; text-align: center; }
.periodo-tab.ativo { background: #4ade4a; color: #071a07; }
.periodo-tab.inativo { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.1); }

.resumo-periodo { background: linear-gradient(135deg,rgba(74,222,74,0.08),rgba(74,222,74,0.02)); border: 1px solid rgba(74,222,74,0.15); border-radius: 16px; padding: 18px; margin-bottom: 16px; }
.resumo-periodo-titulo { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; }
.resumo-grid3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 10px; }
.resumo-item { text-align: center; background: rgba(0,0,0,0.25); border-radius: 10px; padding: 12px 6px; }
.resumo-item .rl { font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
.resumo-item .rv { font-size: 22px; font-weight: 900; }
.resumo-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.resumo-item2 { text-align: center; border-radius: 10px; padding: 10px; }

.dia-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; margin-bottom: 10px; overflow: hidden; }
.dia-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; cursor: pointer; }
.dia-header:active { background: rgba(255,255,255,0.04); }
.dia-badge { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-right: 8px; }
.dia-badge-ativo { background: rgba(74,222,74,0.15); color: #4ade4a; border: 1px solid rgba(74,222,74,0.25); }
.dia-badge-fechado { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.1); }
.dia-data { font-size: 15px; font-weight: 900; color: white; }
.dia-stats { display: flex; gap: 14px; align-items: center; }
.dia-stat-item { text-align: right; }
.dia-stat-val { font-size: 14px; font-weight: 900; }
.dia-stat-lbl { font-size: 10px; color: rgba(255,255,255,0.4); }
.dia-chevron { font-size: 11px; color: rgba(255,255,255,0.3); margin-left: 8px; transition: transform 0.2s; display: inline-block; }
.dia-chevron.aberto { transform: rotate(180deg); }
.dia-corpo { display: none; border-top: 1px solid rgba(255,255,255,0.06); }
.dia-resumo { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.dia-res-item { text-align: center; background: rgba(255,255,255,0.03); border-radius: 10px; padding: 10px 6px; }
.dia-res-lbl { font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.dia-res-val { font-size: 18px; font-weight: 900; }

.bilhete-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); }
.bilhete-row:last-child { border-bottom: none; }
.bilhete-info { flex: 1; }
.bilhete-num { font-size: 13px; font-weight: 900; color: white; }
.bilhete-tel { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
.bilhete-right { display: flex; align-items: center; gap: 8px; }
.bilhete-comissao { font-size: 12px; font-weight: 900; color: #4ade4a; }
.badge { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; }
.badge-din { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.2); }
.badge-pix { background: rgba(74,222,74,0.1); color: #4ade4a; border: 1px solid rgba(74,222,74,0.2); }

.empty { padding: 24px; text-align: center; font-size: 13px; color: rgba(255,255,255,0.3); }
.loading-global { text-align: center; padding: 60px 20px; }
.spinner { width: 28px; height: 28px; border: 3px solid rgba(74,222,74,0.2); border-top-color: #4ade4a; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-txt { font-size: 14px; color: rgba(255,255,255,0.4); margin-top: 12px; }
</style>
</head>
<body>

<div class="login-page" id="loginPage">
  <div class="login-card">
    <div class="login-logo">
      <span class="icon">🍀</span>
      <h1>TRINCOU GANHOU</h1>
      <p>Painel do Cambista</p>
    </div>
    <div class="erro-login" id="erroLogin">⚠️ PIN incorreto ou inválido</div>
    <label class="pin-label" for="pinInput">Seu PIN</label>
    <input type="password" class="pin-input" id="pinInput" placeholder="••••••"
      inputmode="numeric" maxlength="10"
      oninput="this.value=this.value.replace(/\D/g,'')"
      onkeydown="if(event.key==='Enter') entrar()"/>
    <div class="login-loading" id="loginLoading">⏳ Verificando PIN...</div>
    <button class="btn-entrar" id="btnEntrar" onclick="entrar()">ENTRAR</button>
  </div>
</div>

<div id="dashboard">
  <div class="topbar">
    <div class="topbar-left">
      <h2 id="nomeHeader">CAMBISTA</h2>
      <p id="subHeader">Suas vendas</p>
    </div>
    <div class="topbar-right">
      <button class="btn-sm btn-refresh" onclick="carregarDados()">🔄</button>
      <button class="btn-sm btn-sair" onclick="sair()">Sair</button>
    </div>
  </div>

  <div id="loadingGlobal" class="loading-global">
    <div class="spinner"></div>
    <div class="loading-txt">Carregando seus dados...</div>
  </div>

  <div id="conteudo" style="display:none;">
    <div class="resumo-total">
      <div class="card-comissao">
        <div>
          <div class="lbl">💰 Comissão total</div>
          <div class="val" id="totalComissao">R$ 0,00</div>
          <div class="sub" id="subComissao">0 bilhetes × R$ 1,00</div>
        </div>
        <div class="emoji">🤑</div>
      </div>
      <div class="card-mini card-repassar">
        <div class="lbl">💵 A repassar</div>
        <div class="val" id="totalRepassar">R$ 0,00</div>
        <div class="sub">dinheiro</div>
      </div>
      <div class="card-mini">
        <div class="lbl">🎟️ Total</div>
        <div class="val" id="totalBilhetes" style="color:#4ade4a;">0</div>
        <div class="sub">bilhetes</div>
      </div>
    </div>

    <div class="periodo-tabs" id="periodoTabs"></div>
    <div id="listaDias"></div>
  </div>
</div>

<script>
const SCRIPT_URL = '/script';
const SHEET_ID   = '1ZeFUh5ItbA8Ie-v95MOdWvO5uMBxONEK_APLUQWpQBg';
const VALOR_BILHETE = 3.00;
const COMISSAO = 1.00;
let cambistaAtual = '';
let todosOsDias = [];
let filtroAtual = 'atual';

function fmt(v) { return 'R$ ' + v.toFixed(2).replace('.', ','); }
function fmtData(d) {
  if (!d) return '';
  var p = d.split('-');
  return p.length === 3 ? p[2] + '/' + p[1] + '/' + p[0] : d;
}

async function entrar() {
  var pin = document.getElementById('pinInput').value.trim();
  if (!pin) return;
  var btn = document.getElementById('btnEntrar');
  var loading = document.getElementById('loginLoading');
  var erro = document.getElementById('erroLogin');
  btn.disabled = true;
  loading.style.display = 'block';
  erro.style.display = 'none';
  try {
    var resp = await fetch(SCRIPT_URL, {
      method: 'POST', body: new URLSearchParams({ acao: 'verificarpin', pin: pin })
    });
    var found = await resp.json();
    if (!found.ok) {
      erro.style.display = 'block';
      document.getElementById('pinInput').value = '';
    } else {
      cambistaAtual = found.nome;
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      document.getElementById('nomeHeader').textContent = cambistaAtual.toUpperCase();
      await carregarDados();
    }
  } catch(e) {
    erro.textContent = '⚠️ Erro de conexão. Tente novamente.';
    erro.style.display = 'block';
  }
  btn.disabled = false;
  loading.style.display = 'none';
}

function sair() {
  cambistaAtual = '';
  todosOsDias = [];
  filtroAtual = 'atual';
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('pinInput').value = '';
  document.getElementById('conteudo').style.display = 'none';
  document.getElementById('loadingGlobal').innerHTML = '<div class="spinner"></div><div class="loading-txt">Carregando seus dados...</div>';
  document.getElementById('loadingGlobal').style.display = 'block';
  document.getElementById('erroLogin').style.display = 'none';
}

async function carregarDados() {
  document.getElementById('loadingGlobal').style.display = 'block';
  document.getElementById('conteudo').style.display = 'none';
  try {
    var respAbas = await fetch(SCRIPT_URL + '?acao=listarDias');
    var abas = await respAbas.json();
    var abasDia = abas.filter(function(a){ return a.startsWith('Dia_') || a === 'Bilhetes'; });
    todosOsDias = [];
    var promessas = abasDia.map(async function(aba) {
      try {
        var nomeDia = aba === 'Bilhetes' ? 'ativo' : aba.replace('Dia_', '');
        var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
          '/gviz/tq?tqx=out:json&headers=1&sheet=' + encodeURIComponent(aba);
        var r = await fetch(url);
        var text = await r.text();
        var json = JSON.parse(text.substring(47, text.length - 2));
        var rows = json.table.rows || [];
        var meus = rows.filter(function(row) {
          var cam = String(row.c[7] && row.c[7].v || '').trim().toUpperCase();
          return cam === cambistaAtual.toUpperCase();
        }).map(function(row) {
          var telRaw = row.c[6] && row.c[6].v;
          var tel = telRaw != null ? String(typeof telRaw === 'number' ? Math.round(telRaw) : telRaw) : '';
          return {
            id:     String(row.c[0] && row.c[0].v || '').padStart(4,'0'),
            status: String(row.c[5] && row.c[5].v || ''),
            tel:    tel,
          };
        }).filter(function(b) {
          var s = b.status.toUpperCase();
          return s.includes('PAGO') || s.includes('DINHEIRO');
        });
        if (meus.length > 0) todosOsDias.push({ dia: nomeDia, aba: aba, bilhetes: meus });
      } catch(e) {}
    });
    await Promise.all(promessas);
    todosOsDias.sort(function(a, b) {
      var da = a.dia === 'ativo' ? '9999-99-99' : a.dia;
      var db = b.dia === 'ativo' ? '9999-99-99' : b.dia;
      return db.localeCompare(da);
    });
    renderDashboard();
  } catch(e) {
    document.getElementById('loadingGlobal').innerHTML = '<div style="color:#f87171;text-align:center;padding:40px;">⚠️ Erro ao carregar.<br><button onclick="carregarDados()" style="margin-top:12px;background:#4ade4a;color:#071a07;border:none;border-radius:8px;padding:10px 20px;font-weight:900;cursor:pointer;font-family:Nunito,sans-serif;">Tentar novamente</button></div>';
  }
}

function calcularTotais(dias) {
  var bil = 0, din = 0, pix = 0;
  dias.forEach(function(d) {
    d.bilhetes.forEach(function(b) {
      bil++;
      if (b.status.toUpperCase().includes('DINHEIRO')) din++;
      else pix++;
    });
  });
  return { bil: bil, din: din, pix: pix, com: bil * COMISSAO, rep: din * (VALOR_BILHETE - COMISSAO) };
}

function renderDashboard() {
  document.getElementById('subHeader').textContent = todosOsDias.length + ' dia' + (todosOsDias.length !== 1 ? 's' : '') + ' com vendas';
  renderTabs();
  renderResumoTopo();
  renderDias();
  document.getElementById('loadingGlobal').style.display = 'none';
  document.getElementById('conteudo').style.display = 'block';
}

function renderResumoTopo() {
  var tot = calcularTotais(filtrarDias());
  document.getElementById('totalComissao').textContent = fmt(tot.com);
  document.getElementById('subComissao').textContent = tot.bil + ' bilhete' + (tot.bil !== 1 ? 's' : '') + ' × R$ 1,00';
  document.getElementById('totalRepassar').textContent = fmt(tot.rep);
  document.getElementById('totalBilhetes').textContent = tot.bil;
}

function renderTabs() {
  var opcoes = [
    { key: 'atual',  label: '📅 Atual' },
    { key: '7dias',  label: '7 dias'   },
    { key: '30dias', label: '30 dias'  },
    { key: 'todos',  label: 'Todos'    }
  ];
  document.getElementById('periodoTabs').innerHTML = opcoes.map(function(o) {
    return '<button class="periodo-tab ' + (filtroAtual === o.key ? 'ativo' : 'inativo') +
      '" onclick="setFiltro(\'' + o.key + '\')">' + o.label + '</button>';
  }).join('');
}

function setFiltro(f) {
  filtroAtual = f;
  renderTabs();
  renderResumoTopo();
  renderDias();
}

function filtrarDias() {
  var hoje = new Date();
  var hojeStr = hoje.toISOString().substring(0, 10);
  return todosOsDias.filter(function(d) {
    if (filtroAtual === 'atual') return d.dia === 'ativo' || d.dia === hojeStr;
    if (filtroAtual === 'todos') return true;
    if (d.dia === 'ativo') return true;
    var diff = (hoje - new Date(d.dia)) / 86400000;
    if (filtroAtual === '7dias')  return diff <= 7;
    if (filtroAtual === '30dias') return diff <= 30;
    return true;
  });
}

function renderDias() {
  var dias = filtrarDias();
  var container = document.getElementById('listaDias');
  if (dias.length === 0) {
    container.innerHTML = '<div class="empty">Nenhuma venda neste período.</div>';
    return;
  }

  var html = '';

  // Card de resumo consolidado para 7/30/todos
  if (filtroAtual !== 'atual') {
    var t = calcularTotais(dias);
    var label = filtroAtual === '7dias' ? 'Últimos 7 dias' : filtroAtual === '30dias' ? 'Últimos 30 dias' : 'Todo o período';
    html += '<div class="resumo-periodo">' +
      '<div class="resumo-periodo-titulo">📊 ' + label + '</div>' +
      '<div class="resumo-grid3">' +
        '<div class="resumo-item"><div class="rl">🎟️ Bilhetes</div><div class="rv" style="color:#4ade4a;">' + t.bil + '</div></div>' +
        '<div class="resumo-item"><div class="rl">💰 Comissão</div><div class="rv" style="color:#4ade4a;font-size:17px;">' + fmt(t.com) + '</div></div>' +
        '<div class="resumo-item"><div class="rl">💵 Repassar</div><div class="rv" style="color:#f5c518;font-size:17px;">' + fmt(t.rep) + '</div></div>' +
      '</div>' +
      '<div class="resumo-grid2">' +
        '<div class="resumo-item2" style="background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);">' +
          '<div style="font-size:10px;color:rgba(255,255,255,0.4);margin-bottom:4px;">💵 Dinheiro</div>' +
          '<div style="font-size:22px;font-weight:900;color:#60a5fa;">' + t.din + '</div>' +
        '</div>' +
        '<div class="resumo-item2" style="background:rgba(74,222,74,0.08);border:1px solid rgba(74,222,74,0.15);">' +
          '<div style="font-size:10px;color:rgba(255,255,255,0.4);margin-bottom:4px;">✅ PIX</div>' +
          '<div style="font-size:22px;font-weight:900;color:#4ade4a;">' + t.pix + '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }

  // Lista de dias
  dias.forEach(function(d, idx) {
    var din = d.bilhetes.filter(function(b){ return b.status.toUpperCase().includes('DINHEIRO'); }).length;
    var pix = d.bilhetes.length - din;
    var com = d.bilhetes.length * COMISSAO;
    var rep = din * (VALOR_BILHETE - COMISSAO);
    var isAtivo = d.dia === 'ativo';
    var dataFmt = isAtivo ? 'Dia atual (aberto)' : fmtData(d.dia);

    var bilhetesHtml = d.bilhetes.map(function(b) {
      var isDin = b.status.toUpperCase().includes('DINHEIRO');
      return '<div class="bilhete-row">' +
        '<div class="bilhete-info">' +
          '<div class="bilhete-num">Bilhete #' + b.id + '</div>' +
          (b.tel ? '<div class="bilhete-tel">📱 ' + b.tel + '</div>' : '') +
        '</div>' +
        '<div class="bilhete-right">' +
          '<span class="bilhete-comissao">+R$ 1,00</span>' +
          '<span class="badge ' + (isDin ? 'badge-din' : 'badge-pix') + '">' + (isDin ? '💵 Dinheiro' : '✅ PIX') + '</span>' +
        '</div>' +
      '</div>';
    }).join('');

    html += '<div class="dia-card">' +
      '<div class="dia-header" onclick="toggleDia(' + idx + ')">' +
        '<div style="display:flex;align-items:center;">' +
          '<span class="dia-badge ' + (isAtivo ? 'dia-badge-ativo' : 'dia-badge-fechado') + '">' + (isAtivo ? '● Aberto' : '✓') + '</span>' +
          '<span class="dia-data">' + dataFmt + '</span>' +
        '</div>' +
        '<div style="display:flex;align-items:center;">' +
          '<div class="dia-stats">' +
            '<div class="dia-stat-item"><div class="dia-stat-val" style="color:#4ade4a;">' + fmt(com) + '</div><div class="dia-stat-lbl">comissão</div></div>' +
            '<div class="dia-stat-item"><div class="dia-stat-val">' + d.bilhetes.length + '</div><div class="dia-stat-lbl">bilhetes</div></div>' +
          '</div>' +
          '<span class="dia-chevron" id="chev-' + idx + '">▼</span>' +
        '</div>' +
      '</div>' +
      '<div class="dia-corpo" id="corpo-' + idx + '">' +
        '<div class="dia-resumo">' +
          '<div class="dia-res-item"><div class="dia-res-lbl">💵 Dinheiro</div><div class="dia-res-val" style="color:#60a5fa;">' + din + '</div></div>' +
          '<div class="dia-res-item"><div class="dia-res-lbl">✅ PIX</div><div class="dia-res-val" style="color:#4ade4a;">' + pix + '</div></div>' +
          '<div class="dia-res-item"><div class="dia-res-lbl">💵 Repassar</div><div class="dia-res-val" style="color:#f5c518;font-size:14px;">' + fmt(rep) + '</div></div>' +
        '</div>' +
        bilhetesHtml +
      '</div>' +
    '</div>';
  });

  container.innerHTML = html;
}

function toggleDia(idx) {
  var corpo = document.getElementById('corpo-' + idx);
  var chev = document.getElementById('chev-' + idx);
  var aberto = corpo.style.display === 'block';
  corpo.style.display = aberto ? 'none' : 'block';
  chev.className = 'dia-chevron' + (aberto ? '' : ' aberto');
}
</script>
</body>
</html>
