<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Cambista — Trincou Ganhou</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: #0d3d0d; min-height: 100vh; padding: 20px; }

  /* LOGIN */
  .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: white; border-radius: 20px; padding: 32px; width: 100%; max-width: 420px; box-shadow: 0 24px 64px rgba(0,0,0,0.4); }
  h1 { font-size: 22px; font-weight: 900; color: #0d3d0d; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #888; margin-bottom: 24px; }
  input[type=password] { width: 100%; padding: 12px 16px; border: 1.5px solid #ddd; border-radius: 10px; font-size: 16px; font-family: 'Nunito', sans-serif; outline: none; margin-bottom: 12px; }
  input[type=password]:focus { border-color: #1a6e1a; }
  .btn-login { width: 100%; background: #1a6e1a; color: white; border: none; border-radius: 10px; padding: 14px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: 'Nunito', sans-serif; }
  .btn-login:hover { background: #0d3d0d; }
  .erro { color: #e03131; font-size: 13px; margin-bottom: 10px; display: none; font-weight: 700; }

  /* DASHBOARD */
  #dashboard { display: none; max-width: 600px; margin: 0 auto; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .top-bar h2 { font-size: 22px; font-weight: 900; color: white; }
  .btn-sair { background: #e03131; color: white; border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Nunito', sans-serif; }
  .btn-atualizar { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Nunito', sans-serif; }

  /* TOTAL CARD */
  .total-card { background: linear-gradient(135deg, #f5c518, #c9960a); border-radius: 16px; padding: 24px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
  .total-card .label { font-size: 13px; font-weight: 700; color: #5a3800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .total-card .val { font-size: 42px; font-weight: 900; color: #0d3d0d; line-height: 1; }
  .total-card .sub2 { font-size: 12px; color: #5a3800; margin-top: 4px; }
  .total-card-icon { font-size: 56px; opacity: 0.4; }

  /* STATS */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
  .stat { border-radius: 14px; padding: 16px; text-align: center; background: white; }
  .stat-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .stat-val { font-size: 32px; font-weight: 900; }
  .stat-sub { font-size: 11px; margin-top: 4px; }
  .s-green .stat-label { color: #1a5c35; } .s-green .stat-val { color: #0d3d0d; } .s-green .stat-sub { color: #2f9e44; }
  .s-blue .stat-label { color: #1e40af; } .s-blue .stat-val { color: #1e3a8a; } .s-blue .stat-sub { color: #3b82f6; }

  /* SECTION */
  .section-title { font-size: 14px; font-weight: 900; color: white; text-transform: uppercase; letter-spacing: 1px; margin: 24px 0 12px; }

  /* BILHETES */
  .bilhetes-wrap { background: white; border-radius: 14px; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.2); margin-bottom: 24px; }
  .bilhete-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid #f0f0f0; }
  .bilhete-item:last-child { border-bottom: none; }
  .bilhete-num { font-weight: 700; color: #0d3d0d; font-size: 14px; }
  .bilhete-tel { font-size: 11px; color: #888; margin-top: 2px; }
  .bilhete-data { font-size: 11px; color: #aaa; margin-top: 2px; }
  .badge { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
  .badge-dinheiro { background: #dbeafe; color: #1e40af; }
  .badge-pix { background: #d1f7e0; color: #1a5c35; }

  /* LOADING */
  .loading { text-align: center; color: rgba(255,255,255,0.6); padding: 40px; font-size: 14px; }
  .spinner { width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.2); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="card">
    <h1>👤 Painel Cambista</h1>
    <p class="sub">Trincou Ganhou — Digite seu PIN</p>
    <div class="erro" id="erroLogin">⚠️ PIN incorreto!</div>
    <input type="password" id="pinInput" placeholder="Digite seu PIN" maxlength="10"
      oninput="this.value=this.value.replace(/\D/g,'')"
      onkeydown="if(event.key==='Enter') entrar()"/>
    <button class="btn-login" onclick="entrar()">Entrar</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="top-bar">
    <h2>📋 Meu painel</h2>
    <div style="display:flex;gap:8px;">
      <button class="btn-atualizar" onclick="carregarDados()">🔄 Atualizar</button>
      <button class="btn-sair" onclick="sair()">Sair</button>
    </div>
  </div>

  <div id="loadingDash" class="loading"><span class="spinner"></span> Carregando...</div>

  <div id="conteudo" style="display:none;">

    <!-- TOTAL A REPASSAR -->
    <div class="total-card">
      <div>
        <div class="label">A repassar ao organizador</div>
        <div class="val" id="totalDever">R$ 0,00</div>
        <div class="sub2" id="nomeExibido"></div>
      </div>
      <div class="total-card-icon">💵</div>
    </div>

    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat s-green">
        <div class="stat-label">Pago Dinheiro</div>
        <div class="stat-val" id="qtdDinheiro">0</div>
        <div class="stat-sub" id="valDinheiro">R$ 0,00</div>
      </div>
      <div class="stat s-blue">
        <div class="stat-label">Pago PIX</div>
        <div class="stat-val" id="qtdPix">0</div>
        <div class="stat-sub" id="valPix">R$ 0,00</div>
      </div>
    </div>

    <!-- BILHETES DINHEIRO -->
    <div class="section-title">💵 Bilhetes em dinheiro</div>
    <div class="bilhetes-wrap" id="listaDinheiro"></div>

    <!-- BILHETES PIX -->
    <div class="section-title">✅ Bilhetes pagos via PIX</div>
    <div class="bilhetes-wrap" id="listaPix"></div>

  </div>
</div>

<script>
const CAMBISTAS = {
  '991305': 'Thiago',
  // Adicione mais cambistas aqui: 'PIN': 'Nome'
};

const SHEET_ID = '1ZeFUh5ItbA8Ie-v95MOdWvO5uMBxONEK_APLUQWpQBg';
const VALOR = 2.5;
let cambistaAtual = '';

function entrar() {
  const pin = document.getElementById('pinInput').value.trim();
  if (CAMBISTAS[pin]) {
    cambistaAtual = CAMBISTAS[pin];
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    carregarDados();
  } else {
    document.getElementById('erroLogin').style.display = 'block';
    document.getElementById('pinInput').value = '';
  }
}

function sair() {
  cambistaAtual = '';
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('pinInput').value = '';
  document.getElementById('conteudo').style.display = 'none';
  document.getElementById('loadingDash').style.display = 'block';
}

function formatarData(raw) {
  if (!raw) return '';
  try {
    const d = new Date(raw);
    return d.toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
  } catch(e) { return String(raw); }
}

async function carregarDados() {
  document.getElementById('loadingDash').style.display = 'block';
  document.getElementById('conteudo').style.display = 'none';
  document.getElementById('nomeExibido').textContent = 'Cambista: ' + cambistaAtual;

  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=0`;
    const resp = await fetch(url);
    const text = await resp.text();
    const json = JSON.parse(text.substring(47, text.length - 2));
    const rows = json.table.rows;
    const cols = json.table.cols.map(c => c.label);

    const idxId       = 0;
    const idxStatus   = cols.findIndex(c => c.toUpperCase().includes('STATUS'));
    const idxCambista = cols.findIndex(c => c.toUpperCase().includes('CAMBISTA'));
    const idxTel      = cols.findIndex(c => c.toUpperCase().includes('TELEFONE'));
    const idxData     = cols.findIndex(c => c.toUpperCase().includes('DATA'));

    const meusBilhetes = rows.slice(1).filter(row => {
      const cambista = String(row.c[idxCambista]?.v || '').trim().toUpperCase();
      return cambista === cambistaAtual.toUpperCase();
    });

    const dinheiro = meusBilhetes.filter(row => String(row.c[idxStatus]?.v || '').toUpperCase().includes('DINHEIRO'));
    const pix = meusBilhetes.filter(row => {
      const s = String(row.c[idxStatus]?.v || '').toUpperCase();
      return s.includes('PAGO') && !s.includes('DINHEIRO');
    });

    document.getElementById('qtdDinheiro').textContent = dinheiro.length;
    document.getElementById('valDinheiro').textContent = 'R$ ' + (dinheiro.length * VALOR).toFixed(2).replace('.', ',');
    document.getElementById('qtdPix').textContent = pix.length;
    document.getElementById('valPix').textContent = 'R$ ' + (pix.length * VALOR).toFixed(2).replace('.', ',');
    document.getElementById('totalDever').textContent = 'R$ ' + (dinheiro.length * VALOR).toFixed(2).replace('.', ',');

    // Lista dinheiro
    const listaDinheiro = document.getElementById('listaDinheiro');
    if (dinheiro.length === 0) {
      listaDinheiro.innerHTML = '<div style="padding:16px;font-size:13px;color:#888;text-align:center;">Nenhum bilhete em dinheiro ainda.</div>';
    } else {
      listaDinheiro.innerHTML = dinheiro.map(row => {
        const id = String(row.c[idxId]?.v || '').padStart(4,'0');
        const tel = String(row.c[idxTel]?.v || '');
        const data = formatarData(row.c[idxData]?.v);
        return `
          <div class="bilhete-item">
            <div>
              <div class="bilhete-num">Bilhete #${id}</div>
              ${tel ? `<div class="bilhete-tel">📱 ${tel}</div>` : ''}
              ${data ? `<div class="bilhete-data">🕐 ${data}</div>` : ''}
            </div>
            <span class="badge badge-dinheiro">💵 Dinheiro</span>
          </div>`;
      }).join('');
    }

    // Lista PIX
    const listaPix = document.getElementById('listaPix');
    if (pix.length === 0) {
      listaPix.innerHTML = '<div style="padding:16px;font-size:13px;color:#888;text-align:center;">Nenhum bilhete pago via PIX ainda.</div>';
    } else {
      listaPix.innerHTML = pix.map(row => {
        const id = String(row.c[idxId]?.v || '').padStart(4,'0');
        const tel = String(row.c[idxTel]?.v || '');
        const data = formatarData(row.c[idxData]?.v);
        return `
          <div class="bilhete-item">
            <div>
              <div class="bilhete-num">Bilhete #${id}</div>
              ${tel ? `<div class="bilhete-tel">📱 ${tel}</div>` : ''}
              ${data ? `<div class="bilhete-data">🕐 ${data}</div>` : ''}
            </div>
            <span class="badge badge-pix">✅ PIX</span>
          </div>`;
      }).join('');
    }

    document.getElementById('loadingDash').style.display = 'none';
    document.getElementById('conteudo').style.display = 'block';

  } catch(e) {
    document.getElementById('loadingDash').innerHTML = '⚠️ Erro ao carregar. <button onclick="carregarDados()" style="color:white;background:none;border:none;cursor:pointer;font-weight:700;text-decoration:underline;">Tentar novamente</button>';
  }
}
</script>
</body>
</html>
